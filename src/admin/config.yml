backend:
  name: github
  repo: bernardogancho/bollag-guggenheim
  branch: main

local_backend:
  url: http://localhost:8082/api/v1

media_folder: src/assets/media
public_folder: /assets/media

site_url: https://bg-murex-three.vercel.app
display_url: https://bg-murex-three.vercel.app

collections:
  - name: site_settings
    label: Site Settings
    delete: false
    editor:
      preview: false
    files:
      - label: Header and Footer
        name: site
        file: src/_data/cms/site.json
        format: json
        fields:
          - label: Left Navigation
            name: nav
            widget: object
            fields:
              - label: Left Items
                name: left
                widget: list
                summary: "{{fields.label}} -> {{fields.href}}"
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
              - label: Right Items
                name: right
                widget: list
                summary: "{{fields.label}} -> {{fields.href}}"
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
          - label: Footer
            name: footer
            widget: object
            fields:
              - { label: Group Label, name: groupLabel, widget: string }
              - label: Wearhouse Wordmark
                name: wearhouseWordmark
                widget: object
                fields:
                  - { label: Prefix, name: prefix, widget: string }
                  - { label: Name, name: name, widget: string }
                  - label: Suffix Lines
                    name: suffix
                    widget: list
                    field: { label: Line, name: line, widget: string }
              - label: Bollag Contact
                name: bgContact
                widget: object
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Name, name: name, widget: string }
                  - label: Address
                    name: address
                    widget: list
                    field: { label: Line, name: line, widget: string }
                  - { label: Phone Label, name: phoneLabel, widget: string }
                  - { label: Phone Link, name: phoneHref, widget: string }
                  - { label: Email Label, name: emailLabel, widget: string }
                  - { label: Email Link, name: emailHref, widget: string }
                  - { label: Route Label, name: routeLabel, widget: string }
                  - { label: Route Link, name: routeHref, widget: string }
              - label: Wearhouse Contact
                name: wearhouseContact
                widget: object
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Name, name: name, widget: string }
                  - label: Address
                    name: address
                    widget: list
                    field: { label: Line, name: line, widget: string }
                  - { label: Phone Label, name: phoneLabel, widget: string }
                  - { label: Phone Link, name: phoneHref, widget: string }
                  - { label: Email Label, name: emailLabel, widget: string }
                  - { label: Email Link, name: emailHref, widget: string }
                  - { label: Route Label, name: routeLabel, widget: string }
                  - { label: Route Link, name: routeHref, widget: string }
              - label: Footer Navigation
                name: navigation
                widget: object
                fields:
                  - { label: Title, name: title, widget: string }
                  - label: Items
                    name: items
                    widget: list
                    summary: "{{fields.label}} -> {{fields.href}}"
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: Link, name: href, widget: string }
              - label: Footer Meta
                name: meta
                widget: object
                fields:
                  - { label: Since Label, name: since, widget: string }
                  - { label: Group Name, name: groupName, widget: string }

  - name: homepage
    label: Homepage
    delete: false
    editor:
      preview: false
    files:
      - label: Hero Div
        name: home_hero
        file: src/_data/cms/home/hero.json
        format: json
        fields:
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subline, name: subline, widget: string }
              - { label: Poster Image, name: poster, widget: image }
              - { label: Video File, name: video, widget: file }
              - { label: Video Alt Text, name: videoAlt, widget: string }
              - { label: Mobile Object Position, name: mobileObjectPosition, widget: string }
              - { label: Small Screen Object Position, name: smallObjectPosition, widget: string }
              - { label: Desktop Object Position, name: desktopObjectPosition, widget: string }
      - label: Intro Div
        name: home_intro
        file: src/_data/cms/home/intro.json
        format: json
        fields:
          - label: Intro
            name: intro
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: text }
              - { label: Summary, name: summary, widget: text }
              - { label: CTA Label, name: ctaLabel, widget: string }
              - { label: CTA Link, name: ctaHref, widget: string }
              - { label: Image, name: image, widget: image }
              - { label: Image Alt Text, name: imageAlt, widget: string }
      - label: Bollag Portfolio Div
        name: home_brands_wall
        file: src/_data/cms/home/brandsWall.json
        format: json
        fields:
          - label: Bollag Portfolio
            name: brandsWall
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Summary, name: summary, widget: text }
              - label: Brand Cards
                name: items
                widget: list
                summary: "{{fields.name}}"
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Link, name: href, widget: string }
                  - { label: Logo Image, name: logoImage, widget: image }
                  - { label: Hero Image, name: heroImage, widget: image, required: false }
      - label: Wearhouse Portfolio Div
        name: home_wearhouse_wall
        file: src/_data/cms/home/wearhouseWall.json
        format: json
        fields:
          - label: Wearhouse Portfolio
            name: wearhouseWall
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Summary, name: summary, widget: text }
              - label: Brand Cards
                name: items
                widget: list
                summary: "{{fields.name}}"
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Segment, name: segment, widget: string }
                  - { label: Page Link, name: pageHref, widget: string }
                  - { label: Hover Image, name: hoverImage, widget: image, required: false }
      - label: Editorial Selection Div
        name: home_selection
        file: src/_data/cms/home/selectionSection.json
        format: json
        fields:
          - label: Editorial Selection
            name: selection
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - label: Items
                name: items
                widget: list
                summary: "{{fields.brand}}"
                fields:
                  - { label: Brand, name: brand, widget: string }
                  - { label: Image, name: image, widget: image }
                  - { label: Link, name: href, widget: string }
                  - { label: Note, name: note, widget: string }
                  - { label: Size, name: size, widget: select, options: ["standard", "wide", "tall", "feature"] }

